<header class="header">
  <div class="header-inner">
    <a class="brand" href="{{ "/" | relURL }}">{{ .Site.Params.label.text | default .Site.Title }}</a>
    <nav class="nav" aria-label="主导航">
      {{- range .Site.Menus.main -}}
        <a href="{{ .URL | relURL }}" {{ if $.IsMenuCurrent "main" . }}class="active"{{ end }}>{{ .Name }}</a>
      {{- end -}}
      <button type="button" class="theme-btn" id="theme-toggle" title="切换深浅色" aria-label="切换深浅色">◐</button>
    </nav>
  </div>
</header>

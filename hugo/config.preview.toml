# 预览站配置：主题 qz-ink，输出到独立目录，不覆盖生产 hugo_public
baseURL = "/"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
title = "全真夜记"
theme = "qz-ink"
hasCJKLanguage = true
mainSections = ["posts"]
# publishDir 由构建脚本 -d 指定，避免写进生产 volume

[services]
[services.rss]
limit = 20

[params]
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
defaultTheme = "light"
description = "记录深夜写作、自动生成与人工修订后的夜记。"
hidePreviewBadge = false

[params.label]
text = "全真夜记"

[params.homeInfoParams]
Title = "全真夜记"
Content = "廊下灯火，剑气收在袖里。她本是江湖里走得开的人，却被一份未说破的偏爱留在近侧——夜记便是那些守着、等着、独自落笔的时刻。"

[outputs]
home = ["HTML", "RSS", "JSON"]

[[menu.main]]
identifier = "home"
name = "首页"
url = "/"
weight = 10

[[menu.main]]
identifier = "archives"
name = "归档"
url = "/archives/"
weight = 20

[[menu.main]]
identifier = "search"
name = "搜索"
url = "/search/"
weight = 30

[[menu.main]]
identifier = "about"
name = "关于"
url = "/about/"
weight = 40
